<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Öğrenci Kaydı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        /* Siyah/Mavi Arka Plan */
        body { background: linear-gradient(135deg, #000000 0%, #0a1128 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: #ffffff; }
        
        /* Form Kartı */
        .form-card { background: #111827; width: 100%; max-width: 480px; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 85, 255, 0.15); border-top: 4px solid #3b82f6; border-bottom: 1px solid #1f2937; border-left: 1px solid #1f2937; border-right: 1px solid #1f2937; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: #ffffff; font-size: 24px; font-weight: 600; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .header p { color: #94a3b8; font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; color: #60a5fa; font-size: 13px; margin-bottom: 8px; letter-spacing: 0.5px; }
        
        .input-row { display: flex; gap: 15px; }
        .input-row .form-group { flex: 1; }

        input[type="text"] { width: 100%; padding: 12px 15px; border: 1px solid #374151; border-radius: 8px; font-size: 14px; color: #ffffff; background-color: #1f2937; transition: all 0.3s ease; }
        input[type="text"]:focus { border-color: #3b82f6; background-color: #0f172a; box-shadow: 0 0 12px rgba(59, 130, 246, 0.4); outline: none; }
        input[type="text"]::placeholder { color: #64748b; }
        input[readonly] { background-color: #000000; color: #94a3b8; cursor: not-allowed; border-color: #1f2937; }

        .btn-group { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        
        button { width: 100%; padding: 14px; font-size: 15px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; letter-spacing: 0.5px; }
        
        /* Mavi Kaydet Butonu */
        .btn-submit { background: #2563eb; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .btn-submit:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6); }
        
        /* Siyah/Mavi Panele Git Butonu */
        .btn-panel { background: #000000; color: #3b82f6; border: 1px solid #3b82f6; box-shadow: inset 0 0 10px rgba(59,130,246,0.1); }
        .btn-panel:hover { background: #3b82f6; color: #ffffff; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }

        .alert { display: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; text-align: center; margin-top: 20px; }
        .alert-success { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid #059669; }
        .alert-error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid #dc2626; }
    </style>
</head>
<body>

<div class="form-card">
    <div class="header">
        <h2>Öğrenci Bilgi Sistemi</h2>
        <p>Yeni bir öğrenci not kaydı oluşturun</p>
    </div>
    
    <form id="ögrenciform">
        <div class="form-group">
            <label>AD SOYAD</label>
            <input type="text" name="ad" required placeholder="Örn: Ahmet Yılmaz">
        </div>

        <div class="form-group">
            <label>OKUL NUMARASI</label>
            <input type="text" id="numara" name="numara" required maxlength="10" placeholder="10 haneli numara">
        </div>

        <div class="input-row">
            <div class="form-group">
                <label>VİZE NOTU</label>
                <input type="text" id="vize" name="vize" required placeholder="0-100">
            </div>
            <div class="form-group">
                <label>FİNAL NOTU</label>
                <input type="text" id="final" name="final" required placeholder="0-100">
            </div>
        </div>

        <div class="input-row">
            <div class="form-group">
                <label>ORTALAMA</label>
                <input type="text" id="ortalama" name="ortalama" required readonly placeholder="-">
            </div>
            <div class="form-group">
                <label>HARF NOTU</label>
                <input type="text" id="harf" name="harf" required readonly placeholder="-">
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-submit">💾 Sisteme Kaydet</button>
            <button type="button" class="btn-panel" onclick="window.location.href='obs.html'">📋 Kaydedilen Verileri Gör (Panele Git)</button>
        </div>
        
        <div id="mesaj_kutusu" class="alert"></div>
    </form>
</div>

<script>
    document.getElementById('ögrenciform').addEventListener('submit', function(e) {
        e.preventDefault(); 
        let form = this;
        let numaraInput = document.getElementById('numara');
        if (numaraInput.value.length !== 10) { gosterMesaj("Numara 10 haneli olmalıdır!", "error"); return; }
        
        let formData = new FormData(form);
        fetch('kaydet.php', { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            if(data.status === "success") { gosterMesaj("✔ Öğrenci başarıyla kaydedildi!", "success"); form.reset(); } 
            else { gosterMesaj("Hata: " + data.message, "error"); }
        })
        .catch(error => { gosterMesaj("Sunucuya bağlanılamadı.", "error"); });
    });

    function gosterMesaj(metin, tur) {
        let kutu = document.getElementById('mesaj_kutusu');
        kutu.textContent = metin; kutu.className = "alert alert-" + tur; kutu.style.display = 'block';
        setTimeout(() => { kutu.style.display = 'none'; }, 3000);
    }

    function notHesapla() {
        let vize = parseFloat(document.getElementById('vize').value) || 0;
        let final = parseFloat(document.getElementById('final').value) || 0;
        let ortalama = (vize * 0.4) + (final * 0.6);
        document.getElementById('ortalama').value = ortalama.toFixed(2);
        let harf = "";
        if(ortalama >= 90) { harf = "AA (Geçti)"; } else if(ortalama >= 80) { harf = "BB (Geçti)"; } else if(ortalama >= 70) { harf = "CC (Geçti)"; } else if(ortalama >= 60) { harf = "DD (Geçti)"; } else { harf = "FF (Kaldı)"; }
        document.getElementById('harf').value = harf;
    }
    document.getElementById('vize').addEventListener('input', notHesapla);
    document.getElementById('final').addEventListener('input', notHesapla);
    document.getElementById('numara').addEventListener('input', function (e) { this.value = this.value.replace(/[^0-9]/g, ''); });
</script>
</body>
</html>
